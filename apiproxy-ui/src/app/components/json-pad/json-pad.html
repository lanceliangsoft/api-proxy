<main class="main">
  <div class="content">
    <div class="left-side">
      <div class="vbox">
        <div class="title">JSON:</div>
        <button matButton="outlined" (click)="format()">Format</button>
        <button matButton="outlined" (click)="compact()">Compact</button>
        <button matButton="filled" (click)="generate()">Generate</button>
      </div>
      <textarea [(ngModel)]="json"></textarea>
    </div>
    <div class="right-side">
      <mat-tab-group>
        <mat-tab label="C#">
          <textarea [value]="csCode()"></textarea>
        </mat-tab>
        <mat-tab label="Java">
          <textarea [value]="javaCode()"></textarea>
        </mat-tab>
        <mat-tab label="TypeScript">
          <textarea [value]="tsCode()"></textarea>
        </mat-tab>
      </mat-tab-group>
    </div>
  </div>
</main>
