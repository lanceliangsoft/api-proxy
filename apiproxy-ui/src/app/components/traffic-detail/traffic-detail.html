<h2>REST Call</h2>
<table class="detail-form">
  <tr>
    <td>Time:</td>
    <td>{{traffic()?.timestamp}}</td>
  </tr>
  <tr>
    <td>Service Name:</td>
    <td>{{traffic()?.service_name}}</td>
  </tr>
  <tr>
    <td>Method:</td>
    <td>{{traffic()?.method}}</td>
  </tr>
  <tr>
    <td>URL:</td>
    <td>{{traffic()?.url}}</td>
  </tr>
  <tr>
    <td>Status Code:</td>
    <td>{{traffic()?.status_code}}</td>
  </tr>
</table>

<mat-tab-group>
  <mat-tab label="Request">
    <div>Headers:</div>
    <table mat-table [dataSource]="req_headers()" class="mat-elevation-z8">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{element.name}}</td>
      </ng-container>
      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef>Value</th>
        <td mat-cell *matCellDef="let element">{{element.value}}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row;columns: displayedColumns;"></tr>
    </table>

    <div>Body:</div>
    <textarea class="req-body">{{traffic()?.req_body}}</textarea>
  </mat-tab>
  <mat-tab label="Response">
    <div>Headers:</div>
    <table mat-table [dataSource]="resp_headers()" class="mat-elevation-z8">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{element.name}}</td>
      </ng-container>
      <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef>Value</th>
        <td mat-cell *matCellDef="let element">{{element.value}}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row;columns: displayedColumns;"></tr>
    </table>
    <div>Body:</div>
    <textarea class="resp-body">{{traffic()?.resp_body}}</textarea>
  </mat-tab>
  <mat-tab label="Generate">
    <app-generator [traffic]="traffic()"></app-generator>
  </mat-tab>
</mat-tab-group>
